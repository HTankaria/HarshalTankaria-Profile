name: Deploy PowerStack to GitHub Pages

on:
  push:
    branches: [main, claude/powerstack-ev-ai-power-designer]
    paths: [powerstack/**, .github/workflows/deploy-powerstack.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: powerstack/package-lock.json

      - run: npm ci
        working-directory: powerstack

      - run: npm run build
        working-directory: powerstack
        env:
          GITHUB_PAGES: "true"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: powerstack/dist
          force_orphan: true
